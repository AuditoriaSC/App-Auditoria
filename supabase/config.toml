
[functions.finalize-report]
enabled = true
verify_jwt = false
import_map = "./functions/finalize-report/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/finalize-report/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/finalize-report/*.html" ]

[functions.send-inventory-report]
enabled = true
verify_jwt = false
entrypoint = "./functions/send-inventory-report/index.ts"
