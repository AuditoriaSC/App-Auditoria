name: Publicar OTA Preview

on:
  push:
    branches:
      - main
    paths:
      # OTA Android Preview solo debe correr cuando cambia el flujo de Visitas/APK
      # o código compartido usado por la app móvil. Inventarios es web-only.
      - 'app/(auditor)/**'
      - 'app/(auth)/**'
      - 'app/index.tsx'
      - 'assets/**'
      - 'components/**'
      - 'constants/**'
      - 'src/features/audits/**'
      - 'src/navigation/**'
      - 'src/services/**'
      - 'src/types/**'
      - 'src/supabaseClient.ts'
      - 'src/authPolicy.ts'
      - 'src/evidenceStorage.ts'
      - 'src/report-document.ts'
      - 'app.json'
      - 'eas.json'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'

permissions:
  contents: read

concurrency:
  group: deploy-ota-preview
  cancel-in-progress: false

jobs:
  publish-ota-preview:
    name: Publicar OTA Android Preview
    runs-on: ubuntu-latest

    env:
      CI: 1
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v5

      - name: Configurar Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.13.x
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Validar TypeScript
        run: npx tsc --noEmit

      - name: Validar Expo SDK 56
        run: npx expo-doctor

      - name: Publicar actualización OTA en preview
        run: npx --yes eas-cli@20.5.1 update --channel preview --platform android --environment preview --message "main ${GITHUB_SHA}" --non-interactive
