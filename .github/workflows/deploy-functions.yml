name: Desplegar Edge Functions a Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-functions.yml'

permissions:
  contents: read

concurrency:
  group: deploy-supabase-functions
  cancel-in-progress: false

jobs:
  deploy-functions:
    name: Desplegar Edge Functions
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.0

      - name: Desplegar todas las Edge Functions versionadas
        run: supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --use-api
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
