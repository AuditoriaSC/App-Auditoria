name: Validar cambios

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - 'feature/**'

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-app:
    name: Validar aplicación
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.x
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Validar TypeScript
        run: npx tsc --noEmit

      - name: Validar Expo SDK 56
        run: npx expo-doctor

      - name: Validar exportación web
        run: npx expo export --platform web --output-dir dist
