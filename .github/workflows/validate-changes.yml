name: Validar cambios

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - 'feature/**'

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-app:
    name: Validar aplicación
    runs-on: ubuntu-latest

    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_WEB_APP_URL: https://auditoriasc--preview.expo.app
      EXPO_PUBLIC_ANDROID_DOWNLOAD_URL: ${{ secrets.EXPO_PUBLIC_ANDROID_DOWNLOAD_URL }}
      EXPO_PUBLIC_ENABLE_INVENTORY_MODULE: 'true'
      EXPO_PUBLIC_INVENTORY_DEVELOPER_EMAILS: ${{ secrets.EXPO_PUBLIC_INVENTORY_DEVELOPER_EMAILS }}

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v5

      - name: Configurar Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.13.x
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Validar TypeScript
        run: npx tsc --noEmit

      - name: Validar Expo SDK 56
        run: npx expo-doctor

      - name: Validar exportación web
        run: npx expo export --platform web --output-dir dist
